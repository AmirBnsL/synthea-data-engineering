spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.raw                  org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.raw.type             rest
spark.sql.catalog.raw.uri              http://iceberg-rest:8181
spark.sql.catalog.raw.io-impl          org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.raw.s3.endpoint      http://minio:9000
spark.sql.catalog.raw.s3.path-style-access  true
spark.sql.defaultCatalog               raw
spark.eventLog.enabled                 true
spark.eventLog.dir                     /home/iceberg/spark-events
spark.history.fs.logDirectory          /home/iceberg/spark-events
spark.hadoop.fs.s3a.endpoint           http://minio:9000
spark.hadoop.fs.s3a.access.key         admin
spark.hadoop.fs.s3a.secret.key         password
spark.hadoop.fs.s3a.path.style.access  true
spark.hadoop.fs.s3a.impl               org.apache.hadoop.fs.s3a.S3AFileSystem
spark.sql.shuffle.partitions           4
spark.sql.files.maxPartitionBytes      128m
spark.sql.adaptive.enabled             true
spark.driver.memory                    10g
spark.executor.memory                  10g
spark.driver.extraJavaOptions          -XX:+UseG1GC -XX:InitiatingHeapOccupancyPercent=35
